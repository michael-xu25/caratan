<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Caratan — Play vs the Model</title>
<style>
  :root { --bg:#2c5d86; --panel:#14304a; --panel2:#1c4060; --ink:#eaf1f8; --muted:#9fb6cc; --line:#2f5778; --gold:#ffd54a; }
  *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  body{background:var(--bg);color:var(--ink);display:flex;height:100vh;overflow:hidden}
  #board{flex:1;display:flex;align-items:center;justify-content:center} svg{width:100%;height:100%}
  #side{width:400px;background:var(--panel);display:flex;flex-direction:column;border-left:1px solid var(--line)}
  #side h1{font-size:15px;margin:0;padding:13px 16px;background:var(--panel2);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  #side h1 a{color:var(--muted);font-size:12px;font-weight:600;text-decoration:none;background:#23527c;padding:5px 9px;border-radius:6px}
  #side h1 a:hover{background:#2f6ca6;color:#fff}
  .pad{padding:11px 16px} .muted{color:var(--muted);font-size:12px} .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;font-size:12px;font-weight:700;color:#fff}
  #scroll{flex:1 1 auto;overflow-y:auto;min-height:0}
  button{background:#2a5a86;color:#fff;border:0;border-radius:7px;padding:7px 11px;font-size:13px;cursor:pointer}
  button:hover{background:#356da0} button:disabled{opacity:.5;cursor:default}
  .legal{display:flex;flex-direction:column;gap:5px;margin-top:6px}
  .legal button{text-align:left;background:#23527c}
  .legal button:hover{background:#2f6ca6}
  .catbtn{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .costs{display:inline-flex;gap:4px;font-size:12px;opacity:.92;white-space:nowrap}
  .cost{background:#11293e;border-radius:6px;padding:1px 5px}
  .backbtn{background:#3a3050 !important;color:var(--gold);font-weight:700}
  .backbtn:hover{background:#4a3f66 !important}
  #status{font-size:14px;font-weight:700;margin:4px 0;min-height:20px}
  #log{font-size:12px;line-height:1.4} .mv{border-left:2px solid var(--line);padding:3px 0 3px 8px;margin:5px 0}
  .seclabel{font-size:12px;color:var(--muted);margin:8px 0 4px}
  .cards{display:flex;gap:7px;font-size:13px;flex-wrap:wrap}
  .handrow{display:flex;align-items:center;gap:8px;margin:4px 0}
  select,input{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:5px 7px;font-size:13px}
  table{width:100%;font-size:12px} td{padding:2px 0}
  .vpbar{height:13px;border-radius:7px;background:var(--panel2);overflow:hidden;flex:1} .vpfill{height:100%}
</style>
</head>
<body>
  <div id="board"><svg id="svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg></div>
  <div id="side">
    <h1><span>🎲 Play vs the Model</span><a href="index.html" title="Back to the transcript replay viewer">← Transcripts</a></h1>
    <div class="pad" style="border-bottom:1px solid var(--line)">
      <div class="row">
        <span class="muted">You play</span>
        <select id="seat"><option value="RED">RED (first)</option><option value="BLUE">BLUE</option></select>
        <input id="seed" type="number" placeholder="random seed" style="width:108px">
        <button id="new">New game</button>
      </div>
      <div class="muted" id="gameinfo" style="margin-top:6px">No game yet.</div>
    </div>
    <div id="scroll">
      <div class="pad">
        <div id="status">—</div>
        <div class="legal" id="legal"></div>
      </div>
      <div class="pad">
        <div class="seclabel">Victory points</div><table id="vptable"></table>
        <div class="seclabel">Resource cards</div><div id="hands"></div>
      </div>
      <div class="pad">
        <div class="seclabel">Model's moves</div>
        <div id="log" class="muted">—</div>
      </div>
    </div>
  </div>
<script>
const RES_COLOR={WOOD:"#2f7d32",BRICK:"#c4502a",SHEEP:"#9ed16f",WHEAT:"#e6c14b",ORE:"#8b97a6",DESERT:"#d8c79a"};
const RES_ICON={WOOD:"🌲",BRICK:"🧱",SHEEP:"🐑",WHEAT:"🌾",ORE:"🪨",DEV:"🃏"};
const RES5=["WOOD","BRICK","SHEEP","WHEAT","ORE"];
const PCOL={RED:"#d83b3b",BLUE:"#2f74d0"};
// Catan build costs (Catanatron only ever offers AFFORDABLE build actions, so these
// are purely informational — shown with the same icons as the inventory below).
const COSTS={
  BUILD_ROAD:{WOOD:1,BRICK:1},
  BUILD_SETTLEMENT:{WOOD:1,BRICK:1,SHEEP:1,WHEAT:1},
  BUILD_CITY:{WHEAT:2,ORE:3},
  BUY_DEVELOPMENT_CARD:{SHEEP:1,WHEAT:1,ORE:1},
};
const ND={NORTH:[0,-1],NORTHEAST:[Math.sqrt(3)/2,-.5],SOUTHEAST:[Math.sqrt(3)/2,.5],SOUTH:[0,1],SOUTHWEST:[-Math.sqrt(3)/2,.5],NORTHWEST:[-Math.sqrt(3)/2,-.5]};
const PORT_DIR={WEST:["NORTHWEST","SOUTHWEST"],NORTHWEST:["NORTH","NORTHWEST"],NORTHEAST:["NORTHEAST","NORTH"],EAST:["SOUTHEAST","NORTHEAST"],SOUTHEAST:["SOUTH","SOUTHEAST"],SOUTHWEST:["SOUTHWEST","SOUTH"]};
const PIPS={2:1,3:2,4:3,5:4,6:5,8:5,9:4,10:3,11:2,12:1};
const NS="http://www.w3.org/2000/svg", $=id=>document.getElementById(id);
const el=(t,a={})=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const pcol=c=>PCOL[c]||"#bbb";
let V=null,T=null,busy=false,MODE="menu",SEL=null;   // MODE: menu | select | choice ; SEL={kind,opts}

function fit(){const xs=[],ys=[];for(const n of Object.values(V.board.nodes)){xs.push(n.x);ys.push(n.y);}
  const a=Math.min(...xs),b=Math.max(...xs),c=Math.min(...ys),d=Math.max(...ys),p=1.2;
  $("svg").setAttribute("viewBox",`0 0 ${(b-a)+2*p} ${(d-c)+2*p}`);T=(x,y)=>[(x-a)+p,(y-c)+p];}
function hexPts(cx,cy){return Object.values(ND).map(([dx,dy])=>{const[x,y]=T(cx+dx,cy+dy);return`${x},${y}`}).join(" ");}

function draw(){
  const g=el("g");const svg=$("svg");svg.innerHTML="";svg.appendChild(g);
  for(const t of V.board.tiles){
    const water=t.type==="WATER"||t.type==="PORT";
    const fill=t.type==="DESERT"?RES_COLOR.DESERT:water?"#3a79ab":(RES_COLOR[t.resource]||"#777");
    g.appendChild(el("polygon",{points:hexPts(t.x,t.y),fill,stroke:"#1c3d57","stroke-width":.06,"stroke-linejoin":"round"}));
    const[cx,cy]=T(t.x,t.y);
    if(t.number!=null){const hot=t.number===6||t.number===8;
      g.appendChild(el("circle",{cx,cy,r:.36,fill:"#f3ead2",stroke:"#9c8a5e","stroke-width":.03}));
      const tx=el("text",{x:cx,y:cy+.04,"text-anchor":"middle","font-size":.4,"font-weight":700,fill:hot?"#c0392b":"#333"});tx.textContent=t.number;g.appendChild(tx);
      const n=PIPS[t.number]||0;for(let k=0;k<n;k++)g.appendChild(el("circle",{cx:cx+(k-(n-1)/2)*.085,cy:cy+.22,r:.035,fill:hot?"#c0392b":"#555"}));}
  }
  for(const t of V.board.tiles){ if(t.type!=="PORT"||!t.direction||!PORT_DIR[t.direction])continue;
    const[rA,rB]=PORT_DIR[t.direction],nA=[t.x+ND[rA][0],t.y+ND[rA][1]],nB=[t.x+ND[rB][0],t.y+ND[rB][1]];
    const mid=[(nA[0]+nB[0])/2,(nA[1]+nB[1])/2],an=[mid[0]+(t.x-mid[0])*.4,mid[1]+(t.y-mid[1])*.4],[ax,ay]=T(...an);
    for(const nd of[nA,nB]){const[nx,ny]=T(...nd);g.appendChild(el("line",{x1:ax,y1:ay,x2:nx,y2:ny,stroke:"#d9b98a","stroke-width":.045,opacity:.7,"stroke-dasharray":".12 .08"}));}
    const is3=t.port==="3:1";g.appendChild(el("rect",{x:ax-.39,y:ay-.23,width:.78,height:.46,rx:.12,fill:is3?"#15324a":(RES_COLOR[t.port]||"#777"),stroke:"#f3ead2","stroke-width":.045}));
    const lb=el("text",{x:ax,y:ay+.12,"text-anchor":"middle","font-size":.3,"font-weight":800,fill:is3?"#dfe9f2":"#11202c"});lb.textContent=is3?"⚓ 3:1":`${t.port.slice(0,2)} 2:1`;g.appendChild(lb);}
  for(const[k,color]of Object.entries(V.roads)){const[a,b]=k.split("-"),na=V.board.nodes[a],nb=V.board.nodes[b];if(!na||!nb)continue;
    const[x1,y1]=T(na.x,na.y),[x2,y2]=T(nb.x,nb.y);g.appendChild(el("line",{x1,y1,x2,y2,stroke:pcol(color),"stroke-width":.22,"stroke-linecap":"round"}));}
  if(V.robber){const t=V.board.tiles.find(t=>t.coord.join()===V.robber.join());if(t){const[cx,cy]=T(t.x,t.y);g.appendChild(el("circle",{cx,cy,r:.26,fill:"#1b1b1b",opacity:.82}));}}
  for(const[nid,bd]of Object.entries(V.buildings)){const n=V.board.nodes[nid];if(!n)continue;const[x,y]=T(n.x,n.y),s=bd.type==="CITY"?.3:.22;
    g.appendChild(el("rect",{x:x-s,y:y-s,width:2*s,height:2*s,rx:bd.type==="CITY"?.05:.1,fill:pcol(bd.color),stroke:"#10202e","stroke-width":.05,transform:`rotate(45 ${x} ${y})`}));}
  drawOverlay(g);
}

// When picking a build location / robber hex, paint the legal targets ON the board
// (gold + clickable). Clicking one submits exactly that action.
function drawOverlay(g){
  if(MODE!=="select"||!SEL||busy) return;
  const click=(node,i)=>{node.style.cursor="pointer";node.addEventListener("click",()=>move(i));};
  if(SEL.kind==="node"){
    for(const a of SEL.opts){const n=V.board.nodes[a.value];if(!n)continue;const[x,y]=T(n.x,n.y);
      const c=el("circle",{cx:x,cy:y,r:.27,fill:"#ffd54a",stroke:"#9c6f10","stroke-width":.06,opacity:.92});click(c,a.i);g.appendChild(c);}
  } else if(SEL.kind==="edge"){
    for(const a of SEL.opts){const[p,q]=a.value,na=V.board.nodes[p],nb=V.board.nodes[q];if(!na||!nb)continue;
      const[x1,y1]=T(na.x,na.y),[x2,y2]=T(nb.x,nb.y);
      const ln=el("line",{x1,y1,x2,y2,stroke:"#ffd54a","stroke-width":.26,"stroke-linecap":"round",opacity:.92});click(ln,a.i);g.appendChild(ln);}
  } else if(SEL.kind==="tile"){
    const byc={};for(const a of SEL.opts){const key=a.value[0].join();(byc[key]=byc[key]||[]).push(a);}
    for(const[key,as]of Object.entries(byc)){const t=V.board.tiles.find(t=>t.coord.join()===key);if(!t)continue;
      const h=el("polygon",{points:hexPts(t.x,t.y),fill:"#ffd54a",opacity:.40,stroke:"#9c6f10","stroke-width":.1});
      h.style.cursor="pointer";
      h.addEventListener("click",()=> as.length===1 ? move(as[0].i) : enterChoice("Steal from which player?",as,victimFmt));
      g.appendChild(h);}
  }
}

const costChips=cost=>Object.entries(cost).map(([r,n])=>`<span class="cost">${RES_ICON[r]}${n}</span>`).join("");
function catBtn(label,cost,onclick){const b=document.createElement("button");b.className="catbtn";
  b.innerHTML=`<span>${label}</span>${cost?`<span class="costs">${costChips(cost)}</span>`:""}`;b.onclick=onclick;return b;}
function backBtn(){const b=document.createElement("button");b.className="backbtn";b.textContent="← Back";b.onclick=backToMenu;return b;}
function backToMenu(){MODE="menu";SEL=null;$("status").textContent="Your move — pick an action:";renderActions();draw();}
const tradeFmt=a=>{const g=a.value.slice(0,4).filter(x=>x),get=a.value[4];return `Give ${g.length}× ${RES_ICON[g[0]]} → 1× ${RES_ICON[get]}`;};
const victimFmt=a=>a.value[1]?`Steal from ${a.value[1]}`:"Move here (steal nobody)";

function enterSelect(kind,opts,prompt){MODE="select";SEL={kind,opts};$("status").textContent=prompt;
  const L=$("legal");L.innerHTML="";L.appendChild(backBtn());draw();}
function enterChoice(title,opts,fmt){MODE="choice";SEL=null;$("status").textContent=title;
  const L=$("legal");L.innerHTML="";L.appendChild(backBtn());
  opts.forEach(a=>{const b=document.createElement("button");b.className="catbtn";b.innerHTML=`<span>${fmt(a)}</span>`;b.onclick=()=>move(a.i);L.appendChild(b);});draw();}

function renderActions(){
  const L=$("legal");L.innerHTML="";
  if(V.winner||busy||!V.your_turn) return;
  MODE="menu";SEL=null;
  const G={};V.legal.forEach(a=>(G[a.type]=G[a.type]||[]).push(a));const add=b=>L.appendChild(b);
  if(G.ROLL)                add(catBtn("🎲 Roll dice",null,()=>move(G.ROLL[0].i)));
  if(G.BUILD_SETTLEMENT)    add(catBtn("🏠 Build settlement",COSTS.BUILD_SETTLEMENT,()=>enterSelect("node",G.BUILD_SETTLEMENT,"Click a highlighted corner to place your settlement.")));
  if(G.BUILD_CITY)          add(catBtn("🏙️ Upgrade to city",COSTS.BUILD_CITY,()=>enterSelect("node",G.BUILD_CITY,"Click one of your settlements to upgrade it to a city.")));
  if(G.BUILD_ROAD)          add(catBtn("🛣️ Build road",COSTS.BUILD_ROAD,()=>enterSelect("edge",G.BUILD_ROAD,"Click a highlighted edge to build a road.")));
  if(G.BUY_DEVELOPMENT_CARD)add(catBtn("🃏 Buy dev card",COSTS.BUY_DEVELOPMENT_CARD,()=>move(G.BUY_DEVELOPMENT_CARD[0].i)));
  if(G.MARITIME_TRADE)      add(catBtn("🔄 Maritime trade (bank)",null,()=>enterChoice("Choose a bank trade:",G.MARITIME_TRADE,tradeFmt)));
  if(G.MOVE_ROBBER)         add(catBtn("🦹 Move robber",null,()=>enterSelect("tile",G.MOVE_ROBBER,"Click a hex to move the robber onto.")));
  if(G.PLAY_KNIGHT_CARD)    add(catBtn("⚔️ Play knight",null,()=>move(G.PLAY_KNIGHT_CARD[0].i)));
  if(G.PLAY_MONOPOLY)       add(catBtn("💰 Play monopoly",null,()=>enterChoice("Monopolize which resource?",G.PLAY_MONOPOLY,a=>`${RES_ICON[a.value]} ${a.value}`)));
  if(G.PLAY_YEAR_OF_PLENTY) add(catBtn("🎁 Year of plenty",null,()=>enterChoice("Take two resources:",G.PLAY_YEAR_OF_PLENTY,a=>a.value.map(r=>`${RES_ICON[r]}`).join("  "))));
  if(G.PLAY_ROAD_BUILDING)  add(catBtn("🛤️ Road building (2 free roads)",null,()=>move(G.PLAY_ROAD_BUILDING[0].i)));
  if(G.DISCARD)             G.DISCARD.forEach(a=>add(catBtn("🗑️ "+a.label,null,()=>move(a.i))));
  if(G.END_TURN)            add(catBtn("✓ End turn",null,()=>move(G.END_TURN[0].i)));
  const handled=new Set(["ROLL","BUILD_SETTLEMENT","BUILD_CITY","BUILD_ROAD","BUY_DEVELOPMENT_CARD","MARITIME_TRADE","MOVE_ROBBER","PLAY_KNIGHT_CARD","PLAY_MONOPOLY","PLAY_YEAR_OF_PLENTY","PLAY_ROAD_BUILDING","DISCARD","END_TURN"]);
  V.legal.filter(a=>!handled.has(a.type)).forEach(a=>add(catBtn(a.label,null,()=>move(a.i))));   // never leave an action unreachable
}

function panel(){
  $("gameinfo").innerHTML=`vs <b>${MODEL}</b> · seed ${SEED} · turn ${V.turn} · you are <span class="chip" style="background:${pcol(V.human)}">${V.human}</span>`;
  if(V.winner){ $("status").innerHTML = V.winner===V.human?"🏆 You win!":`🤖 Model (${V.winner}) wins.`; $("legal").innerHTML=""; }
  else if(busy){ $("status").textContent="🤖 model thinking…"; $("legal").innerHTML=""; }
  else if(V.your_turn){ $("status").textContent="Your move — pick an action:"; renderActions(); }
  else { $("status").textContent="…"; $("legal").innerHTML=""; }
  $("vptable").innerHTML=V.players.map(c=>{const v=(V.vp||{})[c]||0;return `<tr><td style="width:54px"><span class="chip" style="background:${pcol(c)}">${c}</span></td><td><div class="vpbar"><div class="vpfill" style="width:${Math.min(100,v/10*100)}%;background:${pcol(c)}"></div></div></td><td style="width:30px;text-align:right" class="muted">${v}</td></tr>`;}).join("");
  $("hands").innerHTML=V.players.map(c=>{const h=(V.hands||{})[c]||{};
    const cards=RES5.map(r=>{const n=h[r]||0;return `<span style="${n===0?'opacity:.3':''}">${RES_ICON[r]}&thinsp;${n}</span>`}).join("")+` <span style="${(h.DEV||0)===0?'opacity:.3':''}">${RES_ICON.DEV}&thinsp;${h.DEV||0}</span>`;
    return `<div class="handrow"><span class="chip" style="background:${pcol(c)}">${c}</span><span class="cards">${cards}</span></div>`;}).join("");
}
function logMoves(moves){ if(!moves||!moves.length)return; const box=$("log"); if(box.classList.contains("muted")){box.classList.remove("muted");box.innerHTML="";}
  for(const m of moves){const d=document.createElement("div");d.className="mv";d.innerHTML=`<b>${m.action}</b>${m.reasoning?`<br><span class="muted">${m.reasoning}</span>`:""}`;box.prepend(d);} }

let MODEL="?",SEED="?";
function apply(resp){ if(resp.error){$("status").textContent="⚠️ "+resp.error;} V=resp.view||V; if(resp.seed)SEED=resp.seed; if(resp.model)MODEL=resp.model; busy=false; MODE="menu"; SEL=null; if(V){fit();draw();panel();} logMoves(resp.model_moves);}
async function newGame(){ busy=true;MODE="menu";SEL=null;$("log").className="muted";$("log").textContent="—";$("status").textContent="starting…";
  const r=await fetch("/api/new",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({human:$("seat").value,seed:$("seed").value||null})});
  apply(await r.json()); }
async function move(i){ busy=true;MODE="menu";SEL=null;panel();
  const r=await fetch("/api/move",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({game_id:V.game_id,index:i})});
  apply(await r.json()); }
async function loadGame(id){ busy=true;$("log").className="muted";$("log").textContent="—";$("status").textContent="loading…";
  const r=await fetch("/api/state",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({game_id:id})});
  apply(await r.json()); }
$("new").onclick=newGame;
// ?game=<id> resumes/loads a forked game (handed off from the replay viewer); else fresh game.
const _gid=new URLSearchParams(location.search).get("game");
if(_gid) loadGame(_gid); else newGame();
</script>
</body>
</html>
