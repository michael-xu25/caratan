<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Caratan Replay Viewer</title>
<link rel="stylesheet" href="catan-ui.css" />
</head>
<body>
  <div id="board">
    <div class="boardbtns">
      <a class="navbtn" href="play.html" title="Play a fresh game vs the model">🎮 Play vs Model</a>
      <button class="navbtn" id="takeover" title="Play on from THIS position vs the model (does not change the transcript)">🕹️ Take over from here</button>
    </div>
    <div id="dicebar" class="empty"></div>
    <svg id="svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="drop">
      <div>Drop a <b>.view.json</b> here, or click to choose</div>
      <div class="files">build one with: scripts/build_viewer_data.py &lt;transcript.json&gt;</div>
      <input id="file" type="file" accept=".json" style="display:none" />
    </div>
  </div>

  <div id="side">
    <div class="top">
      <div class="brand"><b>🎬 Caratan Replay</b></div>
      <select id="runsel" title="Pick a sample run / game" style="width:100%;margin-bottom:12px;display:none"></select>
      <div class="pills" id="seats"></div>
      <div class="stats">
        <div><span class="lbl">Turn</span><span class="val" id="sTurn">–</span></div>
        <div><span class="lbl">Ply</span><span class="val" id="sPly">–</span></div>
        <div><span class="lbl">Winner</span><span class="val" id="sWin">–</span></div>
      </div>
    </div>
    <div id="scroll">
      <div class="sec">
        <div class="sechead"><span>Current move</span>
          <button id="gradetoggle" class="iconbtn" title="Show grading verdicts" style="display:none;width:auto;border-radius:7px;padding:2px 8px">⚖️</button></div>
        <div id="action" class="statusline">—</div>
        <div id="note" class="muted" style="margin-bottom:8px"></div>
        <div id="reason"></div>
      </div>
      <div class="sec" id="gradingpad" style="display:none">
        <div class="sechead">⚖️ Grading <span id="gradewinner" class="muted"></span></div>
        <div id="failuremodes" style="margin-bottom:8px"></div>
        <div id="stepgrade" class="muted">—</div>
      </div>
      <div class="sec">
        <div class="sechead">Victory points <span class="tagpub">public</span></div>
        <div id="vptable"></div>
      </div>
      <div class="sec">
        <div class="sechead">Awards <span class="tagpub">public</span></div>
        <div id="awards"></div>
      </div>
      <div class="sec">
        <div class="sechead">Resource cards <span class="tagpub">public</span> · dev <span class="tagpriv">🔒 click 🃏</span></div>
        <div id="hands"></div>
      </div>
    </div>
    <div id="controls">
      <div class="ctlrow">
        <button id="first">⏮</button><button id="prev">◀</button>
        <button id="play">▶ Play</button><button id="next">▶</button><button id="last">⏭</button>
      </div>
      <input id="slider" type="range" min="0" max="0" value="0" />
      <div class="row" style="justify-content:center;margin-top:8px">
        <span id="steplbl" class="muted">—</span>
      </div>
    </div>
  </div>

<script src="catan-ui.js"></script>
<script>
const {dname, pcol, RES_ICON, RES5} = CatanUI;
const $ = id => document.getElementById(id);
let DATA = null, idx = 0, playing = null, T = null;

function render() {
  if (!DATA) return;
  const step = DATA.steps[idx];
  T = CatanUI.fit($("svg"), DATA.board);
  CatanUI.drawBoard($("svg"),
    { board: DATA.board, roads: step.roads, robber: step.robber, buildings: step.buildings },
    T, { highlight: { node: step.value, type: step.action_type } });
  // dice bar over the board: every roll up to this ply (latest big + recent)
  const rolls = [];
  for (let k = 0; k <= idx; k++) { const s = DATA.steps[k];
    if (s.dice) rolls.push({ color: s.color, dice: s.dice, total: s.dice[0]+s.dice[1] }); }
  CatanUI.renderDiceBar($("dicebar"), rolls);
  updatePanel(step);
}

const DEV_NAME = { KNIGHT:"Knight", YEAR_OF_PLENTY:"Year of Plenty", MONOPOLY:"Monopoly",
                   ROAD_BUILDING:"Road Building", VICTORY_POINT:"Victory Point" };
const expandedDevs = new Set();
let curStep = null;
window.toggleDev = c => { expandedDevs.has(c) ? expandedDevs.delete(c) : expandedDevs.add(c);
                         if (curStep) updatePanel(curStep); };

function updatePanel(step) {
  curStep = step;
  const m = DATA.meta;
  const handTotal = c => RES5.reduce((s,r)=>s+(((step.hands||{})[c]||{})[r]||0),0);
  $("sTurn").textContent = step.turn ?? "—";
  $("sPly").textContent = `${idx+1}/${m.num_steps}`;
  $("sWin").textContent = m.winner ? dname(m.winner) : "draw";

  // current move + reasoning
  const g = GRADING && (GRADING.steps||{})[String(step.i)];
  const gradedFlag = !g ? "" : (g.failed && g.failed.length) ? " ⚖✗"
                   : g.llm_graded ? " ⚖" : ((g.regret_vp||0) >= 1 ? " ⚠" : "");
  const valTxt = Array.isArray(step.value) ? `[${step.value}]` : (step.value ?? "");
  $("action").innerHTML =
      `<span class="chip"><span class="dot" style="background:${pcol(step.color)}"></span>`
    + `<span style="color:${pcol(step.color)}">${dname(step.color)}</span></span> `
    + `<b>${step.action_type}</b> <span class="muted">${valTxt}${gradedFlag}</span>`;
  $("note").textContent = step.note || "";
  $("reason").textContent = step.reasoning
    || ((step.num_legal || 0) <= 1
        ? "(forced move — only one legal option; model not consulted)"
        : "(no reasoning recorded)");

  CatanUI.renderVP($("vptable"), DATA.players, step.vp, { finalVp: m.final_vp || {} });

  // awards (public)
  $("awards").innerHTML = DATA.players.map(c => {
    const aw = (step.awards||{})[c] || {};
    const lr = `<span style="${aw.has_road?'color:#f5c33b;font-weight:700':'opacity:.7'}">🛣️ ${aw.road_len||0}${aw.has_road?' · Longest Road +2':''}</span>`;
    const la = `<span style="${aw.has_army?'color:#f5c33b;font-weight:700':'opacity:.7'}">⚔️ ${aw.knights||0}${aw.has_army?' · Largest Army +2':''}</span>`;
    return `<div class="awardrow"><span class="chip" style="width:84px"><span class="dot" style="background:${pcol(c)}"></span><span style="color:${pcol(c)}">${dname(c)}</span></span>${lr}${la}</div>`;
  }).join("");

  CatanUI.renderHands($("hands"), DATA.players, step.hands, { expanded: expandedDevs, onToggleDev: "toggleDev" });

  $("slider").value = idx;
  $("steplbl").textContent = `Step ${idx+1} / ${m.num_steps}`;
  renderStepGrade(step);
}

function setSeats() {
  const s = DATA.meta.seats || {};
  $("seats").innerHTML = Object.entries(s).map(([c,a]) =>
    `<div class="pill"><span class="dot" style="background:${pcol(c)}"></span>`+
    `<span class="nm" style="color:${pcol(c)}">${dname(c)}</span>`+
    `<span class="role">${String(a).split(":").pop().slice(0,16)}</span></div>`).join("");
}

function go(i){ idx = Math.max(0, Math.min(DATA.meta.num_steps-1, i)); render(); }
function load(data){
  DATA = data; idx = 0;
  $("slider").max = DATA.meta.num_steps-1;
  $("drop").classList.add("hidden"); setSeats(); render();
}

// ---- wiring ----
$("first").onclick = ()=>go(0);
$("prev").onclick = ()=>go(idx-1);
$("next").onclick = ()=>go(idx+1);
$("last").onclick = ()=>go(DATA.meta.num_steps-1);
$("slider").oninput = e=>go(+e.target.value);
$("play").onclick = function(){
  if (playing){ clearInterval(playing); playing=null; this.textContent="▶ Play"; }
  else { this.textContent="⏸ Pause";
    playing = setInterval(()=>{ if(idx>=DATA.meta.num_steps-1){clearInterval(playing);playing=null;$("play").textContent="▶ Play";} else go(idx+1); }, 450); }
};
document.onkeydown = e => { if(!DATA) return;
  if(e.key==="ArrowRight") go(idx+1); if(e.key==="ArrowLeft") go(idx-1); };

const fileInput = $("file"), drop = $("drop");
drop.onclick = ()=>fileInput.click();
fileInput.onchange = e => readFile(e.target.files[0]);
drop.ondragover = e => { e.preventDefault(); };
drop.ondrop = e => { e.preventDefault(); readFile(e.dataTransfer.files[0]); };
function readFile(f){ if(!f) return; const r=new FileReader();
  r.onload = ()=>load(JSON.parse(r.result)); r.readAsText(f); }

// ---- run picker (populated from viewer/runs.json) ----
const params = new URLSearchParams(location.search);
function fmtGame(g){ const w = g.winner ? dname(g.winner) : "draw";
  return `${g.label} — ${w}` + (g.num_steps ? ` · ${g.num_steps} plies` : ""); }
async function initPicker(){
  let manifest = null;
  try { manifest = await (await fetch("runs.json", {cache:"no-store"})).json(); } catch(e){}
  if (!manifest || !manifest.runs || !manifest.runs.length) return null;
  const sel = $("runsel"); sel.innerHTML = "";
  for (const run of manifest.runs){
    const og = document.createElement("optgroup"); og.label = run.name;
    for (const g of run.games){
      const o = document.createElement("option"); o.value = g.view; o.textContent = fmtGame(g); og.appendChild(o); }
    sel.appendChild(og);
  }
  sel.onchange = () => loadUrl(sel.value);
  sel.style.display = "";
  return manifest;
}
let SRC = null;
function loadUrl(url){
  fetch(url).then(r=>r.json()).then(d=>{
    load(d); SRC = url; loadGrading(url);
    history.replaceState(null, "", `?data=${url}`);
    const sel = $("runsel"); if (sel) sel.value = url;
  }).catch(()=>{});
}

// "Take over from here" — fork an interactive game at the current ply (read-only).
async function takeOver(){
  if (!SRC) return;
  const btn = $("takeover"); btn.disabled = true; btn.textContent = "forking…";
  try{
    const r = await fetch("/api/fork", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({transcript: SRC, ply: idx})});
    const j = await r.json();
    if (j.error || !j.view){ btn.textContent = "needs play server"; return; }
    location.href = `play.html?game=${j.view.game_id}`;
  }catch(e){ btn.textContent = "needs play server"; }
}

// ---- grading overlay (per-game <game>.grading.json sidecar) ----
let GRADING = null, gradeShown = false;
const gradeUrlOf = v => v.replace(/\.view\.json$/, ".grading.json");
async function loadGrading(viewUrl){
  GRADING = null;
  try { GRADING = await (await fetch(gradeUrlOf(viewUrl), {cache:"no-store"})).json(); } catch(e){}
  const btn = $("gradetoggle");
  if (GRADING){ btn.style.display = ""; renderFailureModes(); if (gradeShown && DATA) renderStepGrade(DATA.steps[idx]); }
  else { btn.style.display = "none"; $("gradingpad").style.display = "none"; gradeShown = false; }
}
function renderFailureModes(){
  if (!GRADING) return;
  $("gradewinner").textContent = GRADING.winner ? `· winner ${dname(GRADING.winner)}` : "· draw";
  const fm = GRADING.failure_modes || [];
  $("failuremodes").innerHTML = fm.length
    ? `<div class="muted" style="margin-bottom:3px">game-level failure modes (why it lost):</div>`
      + fm.map(m=>`<div>• <b>${m.mode}</b> <span class="muted">— ${m.why||""}</span></div>`).join("")
    : `<div class="muted">no game-level failure modes flagged</div>`;
}
function renderStepGrade(step){
  if (!GRADING || !gradeShown) return;
  const s = (GRADING.steps||{})[String(step.i)];
  const node = $("stepgrade");
  if (!s){ node.innerHTML = `<span class="muted">not a scored decision (forced move / roll)</span>`; return; }
  // objective oracle line — present on EVERY decision (free; regret + best legal move)
  const reg = s.regret_vp!=null ? `${(+s.regret_vp).toFixed(2)} VP` : "—";
  const best = s.oracle_best ? ` · oracle best <b>${s.oracle_best}</b>` : "";
  const oracleLine = `<div class="muted">${s.decision_type||"decision"} · regret ${reg}${best}</div>`;
  if (!s.llm_graded){
    node.innerHTML = oracleLine +
      `<div class="muted" style="margin-top:4px;opacity:.75">oracle insight only — not in the LLM-graded sample</div>`;
    return;
  }
  if (!s.failed || !s.failed.length){
    node.innerHTML = oracleLine +
      `<div style="margin-top:5px"><span class="okbadge">✓ no failed criteria</span> <span class="muted">(claude + openai)</span></div>`;
    return;
  }
  node.innerHTML = oracleLine + s.failed.map(f=>{
      const badge = f.disputed ? `<span class="dispbadge">⚠ disputed</span>` : `<span class="failbadge">✗ failed</span>`;
      const reasons = (f.claude?`<div class="muted" style="margin-left:8px">claude: ${f.claude}</div>`:"")
                    + (f.openai?`<div class="muted" style="margin-left:8px">openai: ${f.openai}</div>`:"");
      return `<div style="margin-top:6px"><b>${f.criterion}</b> ${badge}${reasons}</div>`;
    }).join("");
}
$("gradetoggle").onclick = () => {
  gradeShown = !gradeShown;
  $("gradingpad").style.display = gradeShown ? "" : "none";
  if (gradeShown && DATA) renderStepGrade(DATA.steps[idx]);
};

// ---- startup: ?data wins; then ?run (a matchup/run dir); else first run ----
(async () => {
  const manifest = await initPicker();
  const q = params.get("data");
  const runQ = params.get("run");   // matchup deep-link from the dashboard
  if (q){
    fetch(q).then(r=>r.json()).then(d=>{ load(d); SRC = q; loadGrading(q);
      const sel = $("runsel"); if (sel) sel.value = q;
      const s = params.get("step"); if (s!=null) go(+s);
    }).catch(()=>{});
  } else if (runQ && manifest){
    // jump to the named run (match its dir path or name) and open its first game
    const run = manifest.runs.find(r => r.path === runQ || r.name === runQ
      || r.path.endsWith("/" + runQ)) || manifest.runs[0];
    loadUrl(run.games[0].view);
  } else if (manifest){
    loadUrl(manifest.runs[0].games[0].view);
  }
  const t = $("takeover"); if (t) t.onclick = takeOver;
})();
</script>
</body>
</html>
